<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HNARUAK | Student Login</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>

<body>

<nav class="navbar">

<div class="nav-container">

<div class="logo">
📚 HNARUAK
</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="signup.html">Sign Up</a>

</div>

</div>

</nav>

<div class="auth-container">

<div class="auth-card">

<h1>Student Login</h1>

<p>Welcome back! Login to continue your preparation.</p>

<form onsubmit="login(event)">

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
required>

<button type="button" onclick="loginMobile()">Log In</button>

</form>

<p class="auth-link">
Don't have an account?
<a href="signup.html">
Create Account
</a>
</p>

<br>

<p class="auth-link">
<a href="#" onclick="resetPassword()">
Forgot Password?
</a>
</p>

</div>

</div>

<footer class="footer">

<h3>HNARUAK</h3>

<p>Learn • Prepare • Succeed</p>

<br>

<p>© 2026 HNARUAK. All Rights Reserved.</p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="auth.js"></script>

<script>
async function resetPassword(){

const email = prompt("Enter your registered email:");

if(!email) return;

const { error } = await supabase.auth.resetPasswordForEmail(email,{
redirectTo:window.location.origin+"/login.html"
});

if(error){

alert(error.message);

}else{

alert("Password reset email has been sent.");

}

}
</script>

</body>
</html>
