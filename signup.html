<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HNARUAK | Student Signup</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="auth.css">
</head>

<body>

<nav class="navbar">
<div class="nav-container">

<div class="logo">
📚 HNARUAK
</div>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="login.html">Login</a>
</div>

</div>
</nav>

<div class="auth-container">

<div class="auth-card">

<h1>Create Student Account</h1>

<p>Join HNARUAK and start preparing for competitive exams.</p>

<form onsubmit="signUp(event)">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<input
type="password"
id="password"
placeholder="Password"
minlength="6"
required>

<button type="button" onclick="signUpMobile()">Sign Up</button>

Create Account
</button>

</form>

<p class="auth-link">
Already have an account?
<a href="login.html">
Login Here
</a>
</p>

</div>

</div>

<footer class="footer">

<h3>HNARUAK</h3>

<p>Learn • Prepare • Succeed</p>

<p>© 2026 HNARUAK. All Rights Reserved.</p>

</footer>

<script src="auth.js"></script>

</body>
</html>
