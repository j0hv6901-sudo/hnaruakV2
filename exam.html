<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exam Subjects | HNARUAK</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="progress-bar"></div>

<nav class="navbar">
    <div class="nav-container">

        <div class="logo">
            📚 HNARUAK
        </div>

        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="jobs.html">Jobs</a>
            <a href="ca.html">Current Affairs</a>
        </div>

    </div>
</nav>

<header class="header">

<h1 id="exam-title">Exam</h1>

<p>Select a Subject</p>

</header>

<div class="container">

<a href="index.html" class="back">← Back to Home</a>

<div class="search-box">

<input
type="text"
id="subjectSearch"
placeholder="Search Subject...">

</div>

<h2 class="section-title" id="exam-name"></h2>

<div class="category-grid" id="subject-list">

</div>

</div>

<footer class="footer">

<h3>HNARUAK</h3>

<p>Learn • Prepare • Succeed</p>

<p>© 2026 HNARUAK</p>

</footer>

<script>

const urlParams = new URLSearchParams(window.location.search);

const exam = urlParams.get("name");

document.getElementById("exam-title").textContent = exam + " Syllabus";

document.getElementById("exam-name").textContent = exam + " Subjects";

const subjects = {

MPSC:[
"English",
"Simple Arithmetics",
"Reasoning",
"Nursing Paper",
"Computer GK",
"Economics",
"History",
"Science",
"Mizo",
"Indian Polity",
"Geography"
],

Railways:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
],

SSC:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
],

RBI:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"General Awareness",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
],

UPSC:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"General Studies",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
],

Army:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"General Studies",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
],

Banking:[
"English",
"Quantitative Aptitude",
"General Intelligence & Reasoning",
"General Awareness",
"Economics",
"History",
"Science",
"Indian Polity",
"Geography"
]

};

function loadSubjects(){

let html="";

(subjects[exam] || []).forEach(subject=>{

html += `

<a href="subject.html?exam=${encodeURIComponent(exam)}&subject=${encodeURIComponent(subject)}"

class="cat-btn subject-item">

${subject}

</a>

`;

});

document.getElementById("subject-list").innerHTML=html;

}

loadSubjects();

document.getElementById("subjectSearch").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

document.querySelectorAll(".subject-item").forEach(item=>{

item.style.display=item.textContent.toLowerCase().includes(value)

?

"block"

:

"none";

});

});

/* Reading Progress */

window.addEventListener("scroll",()=>{

const scrollTop=document.documentElement.scrollTop;

const scrollHeight=document.documentElement.scrollHeight-document.documentElement.clientHeight;

const progress=(scrollTop/scrollHeight)*100;

document.querySelector(".progress-bar").style.width=progress+"%";

});

</script>

</body>
</html>
