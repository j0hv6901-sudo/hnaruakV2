<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Latest Jobs | HNARUAK</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="progress-bar"></div>

<nav class="navbar">

<div class="nav-container">

<div class="logo">📚 HNARUAK</div>

<div class="nav-links">

<a href="index.html">Home</a>
<a href="ca.html">Current Affairs</a>

</div>

</div>

</nav>

<header class="header">

<h1>Latest Jobs</h1>

<p>Government & Competitive Examination Vacancies</p>

<div class="search-box">

<input
type="text"
id="searchJob"
placeholder="Search Jobs...">

</div>

</header>

<div class="container">

<a href="index.html" class="back">← Home</a>

<h2 class="section-title">Categories</h2>

<div class="filter-grid">

<div class="filter-btn active" onclick="filterJob('All')">All</div>
<div class="filter-btn" onclick="filterJob('MPSC')">MPSC</div>
<div class="filter-btn" onclick="filterJob('SSC')">SSC</div>
<div class="filter-btn" onclick="filterJob('UPSC')">UPSC</div>
<div class="filter-btn" onclick="filterJob('Railways')">Railways</div>
<div class="filter-btn" onclick="filterJob('Banking')">Banking</div>
<div class="filter-btn" onclick="filterJob('Army')">Army</div>

</div>

<div id="job-list" class="loading">

Loading Jobs...

</div>

</div>

<footer class="footer">

<h3>HNARUAK</h3>

<p>Learn • Prepare • Succeed</p>

<p>© 2026 HNARUAK</p>

</footer>

<button id="backToTop">↑</button>

<script>

let jobs=[];

async function loadJobs(){

try{

const res=await fetch("/.netlify/functions/get-content?type=jobs");

jobs=await res.json();

displayJobs(jobs);

}catch{

document.getElementById("job-list").innerHTML=
"<div class='alert alert-danger'>Unable to load jobs.</div>";

}

}

function displayJobs(list){

let html="";

list.forEach(job=>{

html+=`

<div class="job-card">

<span class="badge badge-new">NEW</span>

<h3>${job.title}</h3>

<div class="post-meta">

<span>${job.category}</span>

<span>Last Date : ${job.last_date||"N/A"}</span>

</div>

<p>

<strong>Post :</strong>

${job.post||"-"}

</p>

<p>

<strong>Vacancy :</strong>

${job.vacancy||"-"}

</p>

${job.image_file?

`<img src="${job.image_file}">`

:""}

<div class="button-group">

${job.pdf_file?

`<a class="download-btn"

target="_blank"

href="${job.pdf_file}">

PDF

</a>`

:""}

${job.word_file?

`<a class="download-btn"

target="_blank"

href="${job.word_file}">

WORD

</a>`

:""}

${job.link?

`<a class="apply-btn"

target="_blank"

href="${job.link}">

Apply

</a>`

:""}

<a

class="share-btn"

href="#"

onclick="share('${job.title}')">

Share

</a>

</div>

${job.body?

`<div style="margin-top:20px">

${job.body}

</div>`

:""}

</div>

`;

});

document.getElementById("job-list").innerHTML=html||"<p>No jobs available.</p>";

}

function filterJob(category){

document.querySelectorAll(".filter-btn").forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

if(category==="All"){

displayJobs(jobs);

return;

}

displayJobs(

jobs.filter(j=>j.category===category)

);

}

document.getElementById("searchJob").addEventListener("keyup",function(){

const value=this.value.toLowerCase();

displayJobs(

jobs.filter(job=>

(job.title||"").toLowerCase().includes(value)

)

);

});

function share(title){

if(navigator.share){

navigator.share({

title:title,

url:window.location.href

});

}else{

navigator.clipboard.writeText(window.location.href);

alert("Link copied.");

}

}

const topBtn=document.getElementById("backToTop");

window.addEventListener("scroll",()=>{

topBtn.style.display=

window.scrollY>300

?

"block"

:

"none";

});

topBtn.onclick=()=>{

window.scrollTo({

top:0,

behavior:"smooth"

});

};

window.addEventListener("scroll",()=>{

const st=document.documentElement.scrollTop;

const sh=document.documentElement.scrollHeight-document.documentElement.clientHeight;

document.querySelector(".progress-bar").style.width=(st/sh)*100+"%";

});

loadJobs();

</script>

</body>
</html>
